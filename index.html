<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smaneka App - Kantin & Kontak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        emerald: '#10b981',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-blue-50 text-gray-800 antialiased transition-colors duration-300 dark:bg-darkBg dark:text-gray-100 overflow-x-hidden m-0 p-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Ikon SVG (sama seperti sebelumnya dengan tambahan keranjang opsional) ---
        const Icon = ({ name, className }) => {
            const props = { xmlns: "http://www.w3.org/2000/svg", fill: "none", viewBox: "0 0 24 24", strokeWidth: 1.5, stroke: "currentColor", className: className || "w-6 h-6" };
            switch (name) {
                case 'Beranda': return <svg {...props}><path d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>;
                case 'Absen': return <svg {...props}><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>;
                case 'Kantin': return <svg {...props}><path d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z" /></svg>;
                case 'Kontak': return <svg {...props}><path d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" /></svg>;
                case 'Profil': return <svg {...props}><path d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" /></svg>;
                case 'Settings': return <svg {...props}><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>;
                case 'Logout': return <svg {...props}><path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>;
                case 'Save': return <svg {...props}><path d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0113.186 0z" /></svg>;
                case 'Back': return <svg {...props}><path d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>;
                case 'Phone': return <svg {...props}><path d="M2.25 6.622c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0115.686 0c1.101.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25h-15A2.25 2.25 0 012.25 19.5V6.622z" /></svg>;
                case 'Mail': return <svg {...props}><path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" /></svg>;
                default: return null;
            }
        };

        // --- Halaman Login ---
        const LoginView = ({ users, onLogin }) => {
            const [u, setU] = useState('');
            const [p, setP] = useState('');
            
            const handle = (e) => {
                e.preventDefault();
                const found = users.find(acc => acc.username === u && acc.password === p);
                if (found) onLogin(found);
                else alert('Login gagal! Gunakan: siswa/123, siswi01/123, guru/123, kantin/123');
            };

            return (
                <div className="min-h-screen w-full flex items-center justify-center bg-blue-50 dark:bg-darkBg p-6 animate-fade-in">
                    <form onSubmit={handle} className="bg-white dark:bg-darkCard p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm border border-gray-100 dark:border-gray-800">
                        <div className="text-center mb-8">
                            <h1 className="text-4xl font-black text-primary mb-2 italic tracking-tighter uppercase">Smaneka</h1>
                            <p className="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Digital Hub</p>
                        </div>
                        <input type="text" placeholder="Username" className="w-full p-4 bg-gray-50 dark:bg-darkBg rounded-2xl mb-4" onChange={e=>setU(e.target.value)} />
                        <input type="password" placeholder="Password" className="w-full p-4 bg-gray-50 dark:bg-darkBg rounded-2xl mb-6" onChange={e=>setP(e.target.value)} />
                        <button className="w-full bg-primary text-white py-4 rounded-2xl font-black">Masuk</button>
                    </form>
                </div>
            );
        };

        // --- Halaman Profil (Input & Edit) ---
        const ProfileView = ({ user, contacts, onUpdate }) => {
            const myContact = contacts.find(c => c.id === user.id) || { name: user.name, phone: '', email: '' };
            const [form, setForm] = useState({ ...myContact });

            const save = (e) => {
                e.preventDefault();
                onUpdate(form);
            };

            return (
                <div className="animate-fade-in space-y-6">
                    <div className="bg-white dark:bg-darkCard p-6 rounded-[2rem] text-center">
                        <h2 className="text-xl font-black uppercase italic">{user.role} Profil</h2>
                    </div>
                    <form onSubmit={save} className="space-y-4">
                        <input type="text" value={form.name} placeholder="Nama" className="w-full p-4 rounded-2xl border-none shadow-sm dark:bg-darkCard" onChange={e=>setForm({...form, name: e.target.value})} />
                        <input type="text" value={form.phone} placeholder="Telepon" className="w-full p-4 rounded-2xl border-none shadow-sm dark:bg-darkCard" onChange={e=>setForm({...form, phone: e.target.value})} />
                        <input type="email" value={form.email} placeholder="Email" className="w-full p-4 rounded-2xl border-none shadow-sm dark:bg-darkCard" onChange={e=>setForm({...form, email: e.target.value})} />
                        <button className="w-full bg-emerald-500 text-white p-4 rounded-2xl font-black flex items-center justify-center gap-2"> <Icon name="Save" /> UPDATE DATA </button>
                    </form>
                </div>
            );
        };

        // --- Komponen Kantin: menampilkan makanan dari file terpisah ---
        const KantinView = ({ menu }) => {
            const orderItem = (item) => {
                alert(`✅ Menambahkan ${item.name} ke keranjang (Rp ${item.price.toLocaleString()})`);
            };

            if (!menu || menu.length === 0) {
                return <div className="text-center py-20 text-gray-500">🍽️ Menu kantin sedang disiapkan...</div>;
            }

            return (
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pb-8">
                    {menu.map((item) => (
                        <div key={item.id} className="bg-white dark:bg-darkCard rounded-2xl p-4 shadow-md hover:shadow-xl transition-all">
                            <div className="flex justify-between items-start">
                                <div>
                                    <h3 className="font-black text-lg">{item.name}</h3>
                                    <p className="text-gray-500 text-xs mt-1">{item.description}</p>
                                    <span className="inline-block mt-2 text-[10px] font-bold bg-primary/20 text-primary px-2 py-1 rounded-full">{item.category}</span>
                                </div>
                                <div className="text-right">
                                    <p className="font-black text-emerald-600 dark:text-emerald-400">Rp {item.price.toLocaleString()}</p>
                                    <button onClick={() => orderItem(item)} className="mt-2 text-white bg-primary text-xs font-bold px-3 py-1 rounded-full shadow">Pesan</button>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // --- App Utama ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [usersData, setUsersData] = useState([]);
            const [contactsData, setContactsData] = useState([]);
            const [menuItems, setMenuItems] = useState([]);
            const [activeTab, setActiveTab] = useState('Beranda');
            const [isDark, setDark] = useState(false);
            const [showSettings, setShowSettings] = useState(false);

            // Fetch data dari file eksternal
            useEffect(() => {
                fetch('./users.json').then(res => res.json()).then(data => setUsersData(data.accounts)).catch(e => console.error('users.json error', e));
                fetch('./contacts.json').then(res => res.json()).then(data => setContactsData(data.teachers)).catch(e => console.error('contacts.json error', e));
                fetch('./kantin.json').then(res => res.json()).then(data => setMenuItems(data)).catch(e => console.error('kantin.json error', e));
            }, []);

            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            if (!user) return <LoginView users={usersData} onLogin={setUser} />;

            const updateContact = (newData) => {
                setContactsData(prev => {
                    const exists = prev.find(c => c.id === user.id);
                    if (exists) return prev.map(c => c.id === user.id ? { ...c, ...newData } : c);
                    return [...prev, { id: user.id, ...newData }];
                });
                alert('✅ Data profil diperbarui (simulasi lokal)');
            };

            const renderContent = () => {
                if (showSettings) return (
                    <div className="p-6 bg-blue-50 dark:bg-darkBg min-h-screen">
                        <button onClick={()=>setShowSettings(false)} className="mb-6 p-2 bg-white dark:bg-darkCard rounded-full shadow"><Icon name="Back"/></button>
                        <button onClick={()=>setDark(!isDark)} className="w-full bg-white dark:bg-darkCard p-4 rounded-2xl font-bold mb-4">🌓 Toggle Dark Mode</button>
                        <button onClick={()=>setUser(null)} className="w-full bg-red-500 text-white p-4 rounded-2xl font-black flex gap-2 justify-center"><Icon name="Logout"/> LOGOUT</button>
                    </div>
                );

                switch (activeTab) {
                    case 'Beranda': 
                        return <div className="bg-white dark:bg-darkCard p-10 rounded-[2.5rem]"><h2 className="text-3xl font-black italic">Halo, {user.name.split(' ')[0]}!</h2><p className="text-primary font-bold">{user.role}</p><p className="text-sm mt-4">Selamat datang di Smaneka Digital Hub</p></div>;
                    case 'Kontak': 
                        return (
                            <div className="space-y-4">
                                {contactsData.map(c => (
                                    <div key={c.id} className="bg-white dark:bg-darkCard p-5 rounded-[2rem] flex items-center gap-4 shadow-sm">
                                        <div className="w-12 h-12 bg-primary rounded-full flex items-center justify-center text-white font-black">{c.name[0]}</div>
                                        <div>
                                            <p className="font-black text-sm">{c.name}</p>
                                            <p className="text-[10px] font-bold text-gray-400">{c.phone || '-'}</p>
                                            <p className="text-[10px] font-bold text-primary">{c.email || '-'}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        );
                    case 'Profil': 
                        return <ProfileView user={user} contacts={contactsData} onUpdate={updateContact} />;
                    case 'Kantin':
                        return (
                            <div className="animate-fade-in">
                                <div className="mb-4 flex justify-between items-center">
                                    <h2 className="text-xl font-black italic">🍴 Menu Kantin Sehat</h2>
                                    <span className="text-xs bg-primary/30 px-3 py-1 rounded-full">{menuItems.length} item</span>
                                </div>
                                <KantinView menu={menuItems} />
                            </div>
                        );
                    case 'Absen': 
                        return <div className="flex justify-center py-20"><div className="w-40 h-40 bg-primary rounded-[3rem] shadow-xl flex flex-col items-center justify-center text-white font-black italic">📸 SCAN<br/>QR</div></div>;
                    default: 
                        return <div className="text-center opacity-50 py-20 font-black">Coming Soon...</div>;
                }
            };

            const tabs = user.role === 'Siswa' ? ['Beranda', 'Absen', 'Kantin', 'Kontak'] : ['Beranda', 'Kantin', 'Kontak', 'Profil'];

            return (
                <div className="w-screen min-h-screen transition-all flex flex-col bg-blue-50 dark:bg-darkBg">
                    {!showSettings && (
                        <header className="p-6 flex justify-between items-center sticky top-0 z-20 backdrop-blur-md">
                            <h1 className="text-2xl font-black italic text-primary uppercase">{activeTab}</h1>
                            <button onClick={()=>setShowSettings(true)} className="p-4 bg-white dark:bg-darkCard rounded-2xl shadow-sm"><Icon name="Settings"/></button>
                        </header>
                    )}
                    <main className={!showSettings ? "p-6 flex-1" : ""}>{renderContent()}</main>
                    {!showSettings && (
                        <nav className="fixed bottom-6 left-6 right-6 bg-white/70 dark:bg-darkCard/70 backdrop-blur-2xl rounded-[2.5rem] flex justify-around p-3 shadow-2xl z-30 pointer-events-auto">
                            {tabs.map(t => (
                                <button key={t} onClick={()=>setActiveTab(t)} className={`p-4 rounded-[1.8rem] transition-all ${activeTab === t ? 'bg-primary text-white scale-110 shadow-lg' : 'text-gray-400'}`}>
                                    <Icon name={t}/>
                                </button>
                            ))}
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        * { -webkit-tap-highlight-color: transparent; outline: none; }
    </style>
</body>
</html>
